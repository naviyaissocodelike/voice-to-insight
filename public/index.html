<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice → Actions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #f75a5a;
      --success: #5af7a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    /* Mic button */
    .mic-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    #mic-btn {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 var(--accent-glow);
      position: relative;
    }

    #mic-btn:hover { transform: scale(1.05); }

    #mic-btn.recording {
      background: var(--danger);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(247, 90, 90, 0.5); }
      70%  { box-shadow: 0 0 0 20px rgba(247, 90, 90, 0); }
      100% { box-shadow: 0 0 0 0 rgba(247, 90, 90, 0); }
    }

    #mic-btn svg { pointer-events: none; }

    #status-label {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #status-label.active { color: var(--danger); }

    /* Transcript */
    #transcript-box {
      min-height: 100px;
      max-height: 220px;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      margin-bottom: 20px;
    }

    #transcript-box.placeholder { color: var(--muted); font-style: italic; }

    /* Done button */
    #done-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    #done-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #done-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }

    /* Clear */
    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 10px;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }
    #clear-btn:hover { color: var(--text); border-color: var(--muted); }

    /* Results */
    #results-card {
      display: none;
      margin-top: 24px;
    }

    #results-card.visible { display: block; }

    #results-card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #results-output {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* Markdown rendering */
    #results-output h2 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 20px 0 10px;
    }

    #results-output h2:first-child { margin-top: 0; }

    #results-output ul { list-style: none; padding: 0; }

    #results-output li {
      padding: 7px 0 7px 14px;
      border-left: 2px solid var(--border);
      margin-bottom: 4px;
      font-size: 0.93rem;
      color: var(--text);
    }

    #results-output li.action {
      border-left-color: var(--accent);
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 20px;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Voice → Actions</h1>
  <p>Speak freely. We'll handle the rest.</p>
</header>

<div class="card" id="main-card">
  <div class="mic-wrap">
    <button id="mic-btn" title="Start / stop recording">
      <svg id="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
        <path d="M19 10a7 7 0 0 1-14 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <span id="status-label">Click to speak</span>
  </div>

  <div id="transcript-box" class="placeholder">Your words will appear here as you speak…</div>

  <button id="done-btn" disabled>Extract Action Items</button>
  <button id="clear-btn">Clear</button>
</div>

<div class="card" id="results-card">
  <h2>✦ Extracted</h2>
  <div id="results-output"></div>
  <button class="copy-btn" id="copy-btn">Copy to clipboard</button>
</div>

<script>
  const micBtn = document.getElementById("mic-btn");
  const statusLabel = document.getElementById("status-label");
  const transcriptBox = document.getElementById("transcript-box");
  const doneBtn = document.getElementById("done-btn");
  const clearBtn = document.getElementById("clear-btn");
  const resultsCard = document.getElementById("results-card");
  const resultsOutput = document.getElementById("results-output");
  const copyBtn = document.getElementById("copy-btn");

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    transcriptBox.textContent = "Speech recognition not supported in this browser. Try Chrome or Edge.";
    transcriptBox.classList.remove("placeholder");
    micBtn.disabled = true;
  }

  let recognition;
  let isRecording = false;
  let fullTranscript = "";
  let interimTranscript = "";

  function initRecognition() {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";

    recognition.onresult = (e) => {
      interimTranscript = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          fullTranscript += t + " ";
        } else {
          interimTranscript += t;
        }
      }
      transcriptBox.classList.remove("placeholder");
      transcriptBox.textContent = fullTranscript + interimTranscript;
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
      doneBtn.disabled = !fullTranscript.trim();
    };

    recognition.onerror = (e) => {
      if (e.error === "no-speech") return;
      statusLabel.textContent = "Error: " + e.error;
    };

    recognition.onend = () => {
      if (isRecording) recognition.start();
    };
  }

  micBtn.addEventListener("click", () => {
    if (!SpeechRecognition) return;

    if (!isRecording) {
      initRecognition();
      recognition.start();
      isRecording = true;
      micBtn.classList.add("recording");
      statusLabel.textContent = "Listening…";
      statusLabel.classList.add("active");
    } else {
      recognition.stop();
      isRecording = false;
      micBtn.classList.remove("recording");
      statusLabel.textContent = "Click to speak";
      statusLabel.classList.remove("active");
      doneBtn.disabled = !fullTranscript.trim();
    }
  });

  clearBtn.addEventListener("click", () => {
    if (isRecording) {
      recognition.stop();
      isRecording = false;
      micBtn.classList.remove("recording");
      statusLabel.classList.remove("active");
      statusLabel.textContent = "Click to speak";
    }
    fullTranscript = "";
    interimTranscript = "";
    transcriptBox.textContent = "Your words will appear here as you speak…";
    transcriptBox.classList.add("placeholder");
    doneBtn.disabled = true;
    resultsCard.classList.remove("visible");
    resultsOutput.innerHTML = "";
  });

  doneBtn.addEventListener("click", async () => {
    const transcript = fullTranscript.trim();
    if (!transcript) return;

    if (isRecording) {
      recognition.stop();
      isRecording = false;
      micBtn.classList.remove("recording");
      statusLabel.textContent = "Click to speak";
      statusLabel.classList.remove("active");
    }

    doneBtn.disabled = true;
    resultsCard.classList.add("visible");
    resultsOutput.innerHTML = `<span class="spinner"></span> Extracting…`;

    try {
      const res = await fetch("/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ transcript }),
      });

      if (!res.ok) throw new Error("Server error: " + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let raw = "";

      resultsOutput.innerHTML = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split("\n")) {
          if (!line.startsWith("data: ")) continue;
          const payload = JSON.parse(line.slice(6));
          if (payload.error) throw new Error(payload.error);
          if (payload.text) {
            raw += payload.text;
            resultsOutput.innerHTML = renderMarkdown(raw);
          }
        }
      }
    } catch (err) {
      resultsOutput.innerHTML = `<span style="color:var(--danger)">Error: ${err.message}</span>`;
    } finally {
      doneBtn.disabled = false;
    }
  });

  function renderMarkdown(text) {
    const lines = text.split("\n");
    let html = "";
    for (const line of lines) {
      if (/^## /.test(line)) {
        html += `<h2>${line.slice(3)}</h2>`;
      } else if (/^- \[ \] /.test(line)) {
        html += `<ul><li class="action">☐ ${line.slice(6)}</li></ul>`;
      } else if (/^- /.test(line)) {
        html += `<ul><li>${line.slice(2)}</li></ul>`;
      } else if (line.trim()) {
        html += `<p>${line}</p>`;
      }
    }
    return html;
  }

  copyBtn.addEventListener("click", () => {
    const text = resultsOutput.innerText;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = "Copied!";
      setTimeout(() => (copyBtn.textContent = "Copy to clipboard"), 2000);
    });
  });
</script>
</body>
</html>
